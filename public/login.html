<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Project Roadmap</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Instrument Sans', -apple-system, sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #2E3440 0%, #3B4252 100%);
  position: relative; overflow: hidden;
  padding: 20px;
}
body::before {
  content: '';
  position: absolute; inset: -40%;
  background:
    radial-gradient(35% 45% at 30% 40%, rgba(94,129,172,.35) 0%, transparent 70%),
    radial-gradient(30% 40% at 65% 30%, rgba(136,192,208,.25) 0%, transparent 70%),
    radial-gradient(25% 40% at 75% 70%, rgba(129,161,193,.18) 0%, transparent 70%);
  animation: drift 18s ease-in-out infinite alternate;
}
@keyframes drift {
  from { transform: translate(-3%, -2%) rotate(-2deg); }
  to   { transform: translate(3%, 2%) rotate(2deg); }
}
@media (prefers-reduced-motion: reduce) { body::before { animation: none; } }

.card {
  position: relative; z-index: 1;
  width: min(380px, 100%);
  background: rgba(255,255,255,.98);
  border-radius: 18px;
  padding: 36px 32px;
  box-shadow: 0 24px 60px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.08);
  animation: card-in .4s cubic-bezier(.16,1,.3,1);
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(18px) scale(.97); }
  to   { opacity: 1; transform: none; }
}

.hero {
  display: block;
  width: 150px; height: auto;
  margin: 0 auto 14px;
  user-select: none; -webkit-user-drag: none;
}
h1 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 22px; font-weight: 700; color: #2E3440;
  text-align: center;
}
.sub { font-size: 13px; color: #5B6779; margin: 4px 0 24px; text-align: center; }

label { display: block; font-size: 12px; font-weight: 600; color: #4C566A; margin-bottom: 6px; }
input {
  width: 100%; height: 44px;
  border: 1px solid #D8DEE9; border-radius: 10px;
  padding: 0 14px; font-size: 14px; font-family: inherit;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
input:focus { border-color: #81A1C1; box-shadow: 0 0 0 3px rgba(94,129,172,.18); }

button {
  width: 100%; height: 44px; margin-top: 16px;
  background: linear-gradient(135deg, #81A1C1, #5E81AC);
  color: #fff; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: transform .12s, box-shadow .15s;
  box-shadow: 0 2px 10px rgba(94,129,172,.4);
}
button:hover  { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(94,129,172,.55); }
button:active { transform: none; }
button:disabled { opacity: .6; cursor: default; transform: none; }

.error {
  display: none;
  margin-top: 14px; padding: 10px 12px;
  background: #FEF2F2; color: #DC2626;
  border: 1px solid #FECACA; border-radius: 8px;
  font-size: 13px;
}
.error.show { display: block; animation: shake .3s; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}
</style>
</head>
<body>
  <form class="card" id="login-form">
    <img class="hero" src="login-hero.jpeg" alt="Cat and dog carrying a pencil together">
    <h1>Project Roadmap</h1>
    <p class="sub">Enter the team password to continue.</p>
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" autofocus required>
    <button type="submit" id="btn">Sign in</button>
    <div class="error" id="error">Wrong password — try again.</div>
  </form>
<script>
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const r = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: document.getElementById('password').value })
  }).catch(() => null);
  if (r && r.ok) { location.href = '/'; return; }
  btn.disabled = false; btn.textContent = 'Sign in';
  err.classList.add('show');
  document.getElementById('password').select();
});
</script>
</body>
</html>
