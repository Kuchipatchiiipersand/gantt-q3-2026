services:
  - type: web
    name: gantt-q3-2026
    env: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gantt-db
          property: connectionString

databases:
  - name: gantt-db
    plan: free
